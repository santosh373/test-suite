<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — API Test Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">TestSuite</span>
    </div>
    <h2 class="login-title">Sign in</h2>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" placeholder="admin">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign In →</button>
    </form>
  </div>
</div>

</body>
</html>
